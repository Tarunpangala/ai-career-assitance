              )}

              {filtered.map((u,i)=>(
                <div key={u.id} style={{display:"grid",gridTemplateColumns:"2fr 2.5fr 80px 80px 1fr",
                                        padding:"14px 20px",alignItems:"center",fontSize:13,
                                        borderTop:i>0?"1px solid var(--border2)":"none",
                                        background:u.is_admin?"#fffbeb":"white",
                                        transition:"background 0.15s"}}>
                  <div style={{fontWeight:600}}>
                    {u.name}
                    {u.is_admin&&<span style={{marginLeft:6,background:"#fef3c7",color:"#92400e",
                      fontSize:9,fontWeight:800,padding:"2px 6px",borderRadius:99}}>ADMIN</span>}
                  </div>
                  <div style={{color:"var(--muted)",overflow:"hidden",textOverflow:"ellipsis"}}>{u.email}</div>
                  <div>
                    <span style={{padding:"3px 8px",borderRadius:99,fontSize:11,fontWeight:700,
                      background:u.is_admin?"#fef3c7":"var(--p4)",
                      color:u.is_admin?"#92400e":"var(--p3)"}}>
                      {u.is_admin?"Admin":"User"}
                    </span>
                  </div>
                  <div>
                    <span style={{fontSize:16}}>{u.is_verified?"✅":"⚠️"}</span>
                  </div>
                  <div style={{display:"flex",gap:6}}>
                    {/* Edit */}
                    <button onClick={()=>{setEditUser(u);setEditName(u.name);setEditEmail(u.email);}}
                      style={{padding:"4px 10px",border:"1.5px solid var(--border)",background:"white",
                              borderRadius:7,cursor:"pointer",fontSize:11,fontWeight:600}}>
                      ✏️
                    </button>
                    {/* Promote/Demote */}
                    {!u.is_admin?(
                      <button onClick={()=>promoteUser(u.id,u.name)}
                        style={{padding:"4px 10px",border:"1.5px solid #fcd34d",background:"#fffbeb",
                                borderRadius:7,cursor:"pointer",fontSize:11,fontWeight:600,color:"#92400e"}}>
                        ⬆️
                      </button>
                    ):(
                      <button onClick={()=>demoteUser(u.id,u.name)}
                        style={{padding:"4px 10px",border:"1.5px solid #d1d5db",background:"#f9fafb",
                                borderRadius:7,cursor:"pointer",fontSize:11,fontWeight:600,color:"#6b7280"}}>
                        ⬇️
                      </button>
                    )}
                    {/* Delete */}
                    <button onClick={()=>deleteUser(u.id,u.name)}
                      style={{padding:"4px 10px",border:"1.5px solid #fca5a5",background:"#fef2f2",
                              borderRadius:7,cursor:"pointer",fontSize:11,fontWeight:600,color:"#dc2626"}}>
                      🗑️
                    </button>
                  </div>
                </div>
              ))}
            </div>
          )}

          {/* Edit modal */}
          {editUser&&(
            <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.4)",zIndex:999,
                         display:"flex",alignItems:"center",justifyContent:"center"}}>
              <div style={{background:"white",borderRadius:20,padding:32,width:400,
                           boxShadow:"0 20px 60px rgba(0,0,0,0.2)"}}>
                <div style={{fontSize:18,fontWeight:800,marginBottom:20}}>Edit User</div>
                <div style={{marginBottom:14}}>
                  <label style={{fontSize:12,fontWeight:600,color:"var(--muted)"}}>Name</label>
                  <input value={editName} onChange={e=>setEditName(e.target.value)}
                    style={{width:"100%",padding:"10px 14px",border:"1.5px solid var(--border)",
                            borderRadius:10,fontSize:14,marginTop:4,outline:"none",boxSizing:"border-box"}}/>
                </div>
                <div style={{marginBottom:20}}>
                  <label style={{fontSize:12,fontWeight:600,color:"var(--muted)"}}>Email</label>
                  <input value={editEmail} onChange={e=>setEditEmail(e.target.value)}
                    style={{width:"100%",padding:"10px 14px",border:"1.5px solid var(--border)",
                            borderRadius:10,fontSize:14,marginTop:4,outline:"none",boxSizing:"border-box"}}/>
                </div>
                <div style={{display:"flex",gap:10}}>
                  <button onClick={saveEdit}
                    style={{flex:1,padding:"11px",background:"var(--p)",color:"white",border:"none",
                            borderRadius:10,fontWeight:700,cursor:"pointer",fontSize:14}}>
                    Save Changes
                  </button>
                  <button onClick={()=>setEditUser(null)}
                    style={{flex:1,padding:"11px",background:"var(--bg3)",color:"var(--text)",border:"none",
                            borderRadius:10,fontWeight:700,cursor:"pointer",fontSize:14}}>
                    Cancel
                  </button>
                </div>
              </div>
            </div>
          )}
        </>
      )}

      {/* ── RECENT TAB ── */}
      {tab==="recent"&&stats&&(
        <div style={{background:"white",border:"1.5px solid var(--border)",borderRadius:16,overflow:"hidden",
                     boxShadow:"0 2px 8px rgba(0,0,0,0.04)"}}>
          <div style={{padding:"16px 20px",borderBottom:"1px solid var(--border2)",fontWeight:700,fontSize:15}}>
            🕒 5 Most Recent Sign-ups
          </div>
          {stats.recent_users.map((u,i)=>(
            <div key={u.id} style={{display:"flex",alignItems:"center",gap:14,padding:"14px 20px",
                                    borderTop:i>0?"1px solid var(--border2)":"none"}}>
              <div style={{width:38,height:38,borderRadius:99,
                           background:u.is_admin?"linear-gradient(135deg,#f59e0b,#d97706)":"linear-gradient(135deg,var(--p),var(--p2))",
                           display:"flex",alignItems:"center",justifyContent:"center",
                           color:"white",fontWeight:700,fontSize:14,flexShrink:0}}>
                {u.name.split(" ").map(w=>w[0]).join("").slice(0,2).toUpperCase()}
              </div>
              <div style={{flex:1}}>
                <div style={{fontWeight:600,fontSize:14}}>
                  {u.name}
                  {u.is_admin&&<span style={{marginLeft:6,background:"#fef3c7",color:"#92400e",
                    fontSize:9,fontWeight:800,padding:"2px 5px",borderRadius:99}}>ADMIN</span>}
                </div>
                <div style={{fontSize:12,color:"var(--muted)"}}>{u.email}</div>
              </div>
              <div style={{textAlign:"right"}}>
                <div style={{fontSize:11,color:"var(--muted)"}}>{u.created_at?u.created_at.slice(0,10):"—"}</div>
                <span style={{fontSize:11,fontWeight:700,
                  color:u.is_verified?"#059669":"#d97706"}}>
                  {u.is_verified?"✅ Verified":"⏳ Pending"}
                </span>
              </div>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}


function App() {
  const [user,setUser]=useState(()=>{
    try {
      const u = JSON.parse(localStorage.getItem("user"));
      if(u) u.is_admin = localStorage.getItem("is_admin")==="1" || !!u.is_admin;
      return u;
    } catch{ return null; }
  });
  const [showAuth,setShowAuth]=useState(()=>!localStorage.getItem("token")&&!sessionStorage.getItem("guest"));
  const [showLanding,setShowLanding]=useState(()=>!localStorage.getItem("token")&&!sessionStorage.getItem("guest"));
  const [authTab,setAuthTab]=useState("register");
  const [page,setPage]=useState(()=>{
    // If user is admin, start on admin page
    try {
      const u = JSON.parse(localStorage.getItem("user"));
      if(u && (localStorage.getItem("is_admin")==="1" || u.is_admin)) return "admin";
    } catch{}
    return "dashboard";
  });

  const handleGetStarted = (tab="register") => {
    setAuthTab(tab);
    setShowLanding(false);
  };

  const handleLogin=u=>{
    if(u){
      setUser(u);
      // If user is admin, default to admin page
      if(u.is_admin) setPage("admin");
    }
    else{sessionStorage.setItem("guest","1");}
    setShowAuth(false);
    setShowLanding(false);
  };

  const handleLogout = async () => {
    // Call API logout to revoke token server-side
    try { await apiFetch("/auth/logout",{method:"POST"}); } catch{}
    localStorage.removeItem("token");
    localStorage.removeItem("user");
    localStorage.removeItem("is_verified");
    sessionStorage.removeItem("guest");
    setUser(null); setShowAuth(true); setShowLanding(true);
  };

  if(showLanding) return <LandingPage onGetStarted={handleGetStarted}/>;
  if(showAuth) return <AuthScreen onLogin={handleLogin} defaultTab={authTab}/>;

  const pages = {
    dashboard: <DashboardPage user={user} setPage={setPage}/>,
    mydata:    <MyDataPage user={user}/>,
    skills:    <SkillsPage user={user}/>,
    roadmap:   <RoadmapPage user={user}/>,
    jobs:      <JobsPage/>,
    profile:   <ProfilePage user={user} onLogout={handleLogout}/>,
    admin:     user&&user.is_admin ? <AdminPage user={user}/> : <DashboardPage user={user} setPage={setPage}/>,
  };

  return (
    <div className="layout">
      <Sidebar page={page} setPage={setPage} user={user} onLogout={handleLogout}/>
      <div className="main">{pages[page]||pages.dashboard}</div>
      <FloatingChat user={user}/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
