<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AI Career Assistant</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Bricolage+Grotesque:wght@400;600;700;800&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  /* ── BLUE & WHITE PALETTE ── */
  --p:#1d6ae5;        /* primary royal blue */
  --p2:#3b82f6;       /* mid blue */
  --p3:#1e40af;       /* deep navy */
  --p4:#dbeafe;       /* lightest blue tint */
  --p5:#eff6ff;       /* near-white blue */
  --acc:#0ea5e9;      /* sky accent */
  --acc2:#38bdf8;     /* light sky */
  --ok:#059669;--err:#dc2626;
  --bg:#f0f6ff;       /* soft blue-white page bg */
  --bg2:#ffffff;      /* pure white panels */
  --bg3:#e8f0fe;      /* light blue-grey for hover states */
  --card:#ffffff;
  --card2:#f8fbff;
  --border:#c7d9f5;   /* soft blue border */
  --border2:#e2edff;
  --text:#0f1c3f;     /* deep navy text */
  --muted:#5878a0;    /* muted blue-grey */
  --light:#0f1c3f;
  --grad:linear-gradient(135deg,#1d6ae5,#3b82f6);
  --grad2:linear-gradient(135deg,#0ea5e9,#38bdf8);
  --grad3:linear-gradient(135deg,#1e40af,#1d6ae5);
  --shadow:0 1px 3px rgba(29,106,229,0.08),0 4px 16px rgba(29,106,229,0.06);
  --shadow-md:0 4px 12px rgba(29,106,229,0.12),0 8px 32px rgba(29,106,229,0.08);
  --shadow-lg:0 8px 24px rgba(29,106,229,0.15),0 20px 48px rgba(29,106,229,0.1);
}

body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
h1,h2,h3,.heading{font-family:'Bricolage Grotesque',sans-serif}

/* SCROLLBAR */
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:var(--bg3)}
::-webkit-scrollbar-thumb{background:var(--p2);border-radius:3px}

/* ── AUTH SPLIT PANEL ── */
.auth-page{min-height:100vh;display:grid;grid-template-columns:1fr 1fr;position:relative;overflow:hidden}

/* Animated background orbs */
.auth-bg{position:fixed;inset:0;z-index:0;background:#f0f5ff;overflow:hidden;pointer-events:none}
.auth-orb{position:absolute;border-radius:50%;filter:blur(80px);opacity:0.55;animation:orbDrift 14s ease-in-out infinite alternate}
.auth-orb:nth-child(1){width:560px;height:560px;top:-140px;left:-160px;background:radial-gradient(circle,#bfcfff,#dde8ff);animation-duration:13s}
.auth-orb:nth-child(2){width:420px;height:420px;bottom:-100px;right:-120px;background:radial-gradient(circle,#c7e0ff,#e6f0ff);animation-duration:17s;animation-delay:-5s}
.auth-orb:nth-child(3){width:280px;height:280px;top:55%;left:30%;background:radial-gradient(circle,#a5c8ff,#d4e8ff);animation-duration:10s;animation-delay:-8s}
@keyframes orbDrift{from{transform:translate(0,0) scale(1)}to{transform:translate(30px,24px) scale(1.06)}}
.auth-bg-grid{position:absolute;inset:0;background-image:linear-gradient(rgba(29,106,229,0.04) 1px,transparent 1px),linear-gradient(90deg,rgba(29,106,229,0.04) 1px,transparent 1px);background-size:48px 48px}

/* Left hero panel */
.auth-left{position:relative;z-index:1;display:flex;flex-direction:column;justify-content:center;padding:64px 72px}
.auth-brand{position:absolute;top:40px;left:56px;display:flex;align-items:center;gap:10px}
.auth-brand-mark{width:38px;height:38px;background:var(--grad);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;box-shadow:0 4px 16px rgba(29,106,229,0.3)}
.auth-brand-name{font-family:'Bricolage Grotesque',sans-serif;font-size:18px;font-weight:800;color:var(--text);letter-spacing:-0.3px}
.auth-hero{max-width:440px}
.auth-hero-tag{display:inline-flex;align-items:center;gap:7px;background:rgba(29,106,229,0.09);border:1px solid rgba(29,106,229,0.18);border-radius:100px;padding:5px 14px;font-size:12px;font-weight:600;color:var(--p);margin-bottom:28px;letter-spacing:0.2px}
.auth-hero-dot{width:6px;height:6px;background:var(--p);border-radius:50%;animation:heroDot 2s ease-in-out infinite}
@keyframes heroDot{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.5;transform:scale(0.7)}}
.auth-hero h1{font-family:'Bricolage Grotesque',sans-serif;font-size:52px;line-height:1.1;color:var(--text);letter-spacing:-1.5px;margin-bottom:20px}
.auth-hero h1 em{font-style:italic;color:var(--p)}
.auth-hero p{font-size:16px;line-height:1.7;color:var(--muted);max-width:340px;margin-bottom:44px}
.auth-features{display:flex;flex-direction:column;gap:14px}
.auth-feature{display:flex;align-items:flex-start;gap:14px;animation:fadeUp 0.6s ease both}
.auth-feature:nth-child(1){animation-delay:0.1s}
.auth-feature:nth-child(2){animation-delay:0.2s}
.auth-feature:nth-child(3){animation-delay:0.3s}
.auth-feature-ico{width:36px;height:36px;flex-shrink:0;background:white;border:1px solid var(--border);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:16px;box-shadow:0 2px 8px rgba(0,0,0,0.05)}
.auth-feature-text strong{display:block;font-size:14px;font-weight:700;color:var(--text);margin-bottom:2px}
.auth-feature-text span{font-size:13px;color:var(--muted);line-height:1.5}

/* Right card panel */
.auth-right{position:relative;z-index:1;display:flex;align-items:center;justify-content:center;padding:48px 56px}
.auth-card{width:100%;max-width:420px;background:rgba(255,255,255,0.9);backdrop-filter:blur(24px);border:1px solid rgba(255,255,255,0.95);border-radius:24px;padding:44px 40px;box-shadow:0 2px 4px rgba(29,106,229,0.04),0 8px 24px rgba(29,106,229,0.08),0 32px 64px rgba(29,106,229,0.07);animation:fadeUp 0.5s cubic-bezier(0.16,1,0.3,1)}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}

/* Tabs */
.auth-tabs{display:flex;background:var(--bg3);border:1px solid var(--border2);border-radius:12px;padding:4px;margin-bottom:32px}
.auth-tab{flex:1;padding:10px 16px;border:none;background:none;font-family:'Plus Jakarta Sans',sans-serif;font-size:14px;font-weight:500;cursor:pointer;border-radius:9px;color:var(--muted);transition:all 0.2s}
.auth-tab.active{background:white;color:var(--text);font-weight:700;box-shadow:0 1px 4px rgba(0,0,0,0.08),0 2px 8px rgba(29,106,229,0.06)}

/* Card heading */
.auth-card-title{font-family:'Bricolage Grotesque',sans-serif;font-size:26px;font-weight:800;color:var(--text);letter-spacing:-0.5px;margin-bottom:5px}
.auth-card-sub{font-size:14px;color:var(--muted);line-height:1.5;margin-bottom:28px}

/* Fields */
.field{margin-bottom:18px}
.field label{display:block;font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:0.6px;margin-bottom:7px}
.field-wrap{position:relative}
.field input{width:100%;padding:13px 16px;background:white;border:1.5px solid var(--border);border-radius:11px;font-family:'Plus Jakarta Sans',sans-serif;font-size:15px;color:var(--text);outline:none;transition:all 0.2s}
.field input:focus{border-color:var(--p);box-shadow:0 0 0 3.5px rgba(29,106,229,0.1)}
.field input.has-eye{padding-right:44px}

/* Eye toggle */
.eye-btn{position:absolute;right:13px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--muted);font-size:16px;line-height:1;padding:4px;transition:color 0.15s}
.eye-btn:hover{color:var(--p)}

/* Strength bar */
.strength-wrap{margin-top:8px;display:flex;align-items:center;gap:8px}
.strength-bars{display:flex;gap:3px;flex:1}
.strength-bar{flex:1;height:3px;border-radius:3px;background:var(--border2);transition:background 0.35s}
.strength-lbl{font-size:11px;color:var(--muted);white-space:nowrap;min-width:42px;text-align:right}

/* Error box */
.auth-err{background:#fef2f2;border:1.5px solid #fecaca;color:#b91c1c;border-radius:10px;padding:10px 14px;font-size:13px;margin-bottom:16px;display:flex;align-items:flex-start;gap:8px;animation:fadeUp 0.2s ease}

/* Primary button */
.auth-btn{width:100%;padding:14px;background:var(--grad);color:white;border:none;border-radius:12px;font-family:'Bricolage Grotesque',sans-serif;font-size:15px;font-weight:700;cursor:pointer;transition:all 0.2s;box-shadow:0 2px 8px rgba(29,106,229,0.25),0 1px 3px rgba(29,106,229,0.2);display:flex;align-items:center;justify-content:center;gap:8px;position:relative;overflow:hidden;margin-top:4px}
.auth-btn::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,0.1),transparent);pointer-events:none}
.auth-btn:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(29,106,229,0.35)}
.auth-btn:disabled{opacity:0.55;cursor:not-allowed;transform:none;box-shadow:none}

/* Spinner in button */
.btn-spin{width:16px;height:16px;border:2px solid rgba(255,255,255,0.35);border-top-color:white;border-radius:50%;animation:btnSpin 0.7s linear infinite;flex-shrink:0}
@keyframes btnSpin{to{transform:rotate(360deg)}}

/* Divider + switch */
.auth-divider{display:flex;align-items:center;gap:12px;margin:18px 0;color:var(--muted);font-size:12px}
.auth-divider::before,.auth-divider::after{content:'';flex:1;height:1px;background:var(--border2)}
.auth-switch{text-align:center;margin-top:18px;font-size:13px;color:var(--muted)}
.auth-switch-link{background:none;border:none;cursor:pointer;color:var(--p);font-weight:700;font-size:13px;font-family:'Plus Jakarta Sans',sans-serif;transition:color 0.15s}
.auth-switch-link:hover{color:var(--p3);text-decoration:underline}
.guest-btn{display:block;width:100%;text-align:center;background:none;border:none;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;font-size:13px;color:var(--muted);padding:10px;transition:color 0.15s}
.guest-btn:hover{color:var(--text)}

/* Responsive */
@media(max-width:900px){.auth-page{grid-template-columns:1fr}.auth-left{display:none}.auth-right{padding:32px 20px;min-height:100vh}.auth-card{max-width:100%}}

/* ── LAYOUT ── */
.layout{display:flex;min-height:100vh}

/* ── SIDEBAR ── */
.sidebar{
  width:240px;
  background:white;
  border-right:1px solid var(--border2);
  display:flex;flex-direction:column;
  position:fixed;left:0;top:0;height:100vh;z-index:100;
  box-shadow:2px 0 12px rgba(29,106,229,0.06);
}
.sb-logo{padding:22px 18px;border-bottom:1px solid var(--border2);display:flex;align-items:center;gap:10px}
.sb-logo-icon{width:36px;height:36px;background:var(--grad);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0;box-shadow:0 4px 10px rgba(29,106,229,0.25)}
.sb-logo-text{font-family:'Bricolage Grotesque',sans-serif;font-size:14px;font-weight:800;color:var(--text);line-height:1.2}
.sb-nav{flex:1;padding:14px 10px;overflow-y:auto}
.nav-btn{display:flex;align-items:center;gap:10px;padding:11px 13px;border-radius:10px;cursor:pointer;font-size:13px;font-weight:500;color:var(--muted);transition:all 0.15s;margin-bottom:2px;border:none;background:none;width:100%;text-align:left;font-family:'Plus Jakarta Sans',sans-serif}
.nav-btn:hover{background:var(--p5);color:var(--p)}
.nav-btn.active{background:var(--p4);color:var(--p3);font-weight:700;border-left:3px solid var(--p)}
.nav-icon{font-size:17px;flex-shrink:0}
.sb-user{padding:14px 10px;border-top:1px solid var(--border2)}
.user-card{background:var(--p5);border:1px solid var(--border);border-radius:12px;padding:12px;display:flex;align-items:center;gap:10px}
.user-av{width:34px;height:34px;border-radius:50%;background:var(--grad);display:flex;align-items:center;justify-content:center;font-family:'Bricolage Grotesque',sans-serif;font-weight:800;font-size:13px;color:white;flex-shrink:0;box-shadow:0 2px 8px rgba(29,106,229,0.25)}
.user-nm{font-size:13px;font-weight:700;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.user-em{font-size:11px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.logout-btn{background:none;border:none;cursor:pointer;font-size:15px;color:var(--muted);transition:color 0.15s;padding:4px;flex-shrink:0}
.logout-btn:hover{color:var(--err)}

/* ── MAIN ── */
.main{margin-left:240px;flex:1;padding:32px;min-height:100vh;background:var(--bg)}

/* ── CARD ── */
.card{background:var(--card);border:1px solid var(--border2);border-radius:16px;padding:24px;margin-bottom:20px;box-shadow:var(--shadow)}
.card-title{font-family:'Bricolage Grotesque',sans-serif;font-size:15px;font-weight:700;color:var(--text);margin-bottom:16px;display:flex;align-items:center;gap:8px}

/* ── PAGE HEADER ── */
.ph{margin-bottom:28px}
.ph h1{font-family:'Bricolage Grotesque',sans-serif;font-size:26px;font-weight:800;color:var(--text)}
.ph p{font-size:14px;color:var(--muted);margin-top:4px}

/* ── WELCOME BANNER ── */
.banner{
  background:var(--grad3);
  border-radius:20px;padding:28px 32px;margin-bottom:24px;
  position:relative;overflow:hidden;
  box-shadow:0 8px 24px rgba(29,106,229,0.2);
}
.banner::before{content:'';position:absolute;top:-60px;right:-60px;width:240px;height:240px;background:radial-gradient(circle,rgba(255,255,255,0.1),transparent 70%);pointer-events:none}
.banner::after{content:'';position:absolute;bottom:-40px;left:40px;width:140px;height:140px;background:radial-gradient(circle,rgba(14,165,233,0.25),transparent 70%);pointer-events:none}
.banner h2{font-family:'Bricolage Grotesque',sans-serif;font-size:22px;font-weight:800;color:white}
.banner p{font-size:14px;color:rgba(255,255,255,0.8);margin-top:4px}

/* ── STATS GRID ── */
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:24px}
.stat-card{background:white;border:1px solid var(--border2);border-radius:14px;padding:18px;display:flex;align-items:center;gap:14px;transition:all 0.2s;box-shadow:var(--shadow)}
.stat-card:hover{transform:translateY(-3px);border-color:var(--p2);box-shadow:var(--shadow-md)}
.stat-ico{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.stat-v{font-family:'Bricolage Grotesque',sans-serif;font-size:22px;font-weight:800;color:var(--text)}
.stat-l{font-size:11px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:0.5px}

/* ── GRID ── */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:20px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px}

/* ── UPLOAD AREA ── */
.upload-area{
  border:2px dashed var(--border);border-radius:14px;padding:36px;text-align:center;
  cursor:pointer;transition:all 0.2s;background:var(--p5);
}
.upload-area:hover,.upload-area.drag{border-color:var(--p);background:var(--p4)}
.upload-area .up-icon{font-size:44px;margin-bottom:12px}
.upload-area p{color:var(--muted);font-size:14px}
.upload-area strong{color:var(--p)}

/* ── BUTTONS ── */
.btn{padding:11px 22px;border:none;border-radius:10px;cursor:pointer;font-family:'Bricolage Grotesque',sans-serif;font-weight:700;font-size:13px;transition:all 0.15s;letter-spacing:0.3px}
.btn-p{background:var(--grad);color:white;box-shadow:0 2px 8px rgba(29,106,229,0.25)}
.btn-p:hover{transform:translateY(-1px);box-shadow:0 6px 16px rgba(29,106,229,0.35)}
.btn-p:disabled{opacity:0.5;cursor:not-allowed;transform:none;box-shadow:none}
.btn-o{background:transparent;border:1.5px solid var(--border);color:var(--text)}
.btn-o:hover{border-color:var(--p);color:var(--p);background:var(--p5)}
.btn-acc{background:var(--grad2);color:white;box-shadow:0 2px 8px rgba(14,165,233,0.25)}
.btn-acc:hover{transform:translateY(-1px);box-shadow:0 6px 16px rgba(14,165,233,0.35)}

/* ── INPUT ── */
.inp{width:100%;padding:12px 16px;background:var(--bg3);border:1.5px solid var(--border);border-radius:10px;font-family:'Plus Jakarta Sans',sans-serif;font-size:14px;color:var(--text);outline:none;transition:all 0.2s}
.inp:focus{border-color:var(--p);background:white;box-shadow:0 0 0 3px rgba(29,106,229,0.1)}

/* ── SKILL BARS ── */
.skill-bar-wrap{margin-bottom:14px}
.skill-bar-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.skill-bar-name{font-size:13px;font-weight:600;color:var(--text)}
.skill-bar-pct{font-family:'Bricolage Grotesque',sans-serif;font-size:13px;font-weight:700}
.skill-bar-track{height:10px;background:var(--bg3);border-radius:10px;overflow:hidden;border:1px solid var(--border2)}
.skill-bar-fill{height:100%;border-radius:10px;transition:width 1.2s cubic-bezier(0.16,1,0.3,1);width:0}
.skill-bar-fill.have{background:linear-gradient(90deg,#059669,#34d399)}
.skill-bar-fill.missing{background:linear-gradient(90deg,var(--p),var(--acc))}
.skill-bar-fill.target{background:var(--grad);opacity:0.3}

/* ── MATCH SCORE RING ── */
.score-ring{position:relative;width:120px;height:120px;flex-shrink:0}
.score-ring svg{transform:rotate(-90deg)}
.score-ring-text{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.score-num{font-family:'Bricolage Grotesque',sans-serif;font-size:28px;font-weight:800;color:var(--text)}
.score-label{font-size:10px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:0.5px}

/* ── ROADMAP TIMELINE ── */
.timeline{position:relative;padding-left:32px}
.timeline::before{content:'';position:absolute;left:10px;top:0;bottom:0;width:2px;background:linear-gradient(to bottom,var(--p),var(--acc),transparent)}
.timeline-month{position:relative;margin-bottom:32px;animation:slideIn 0.5s ease both}
@keyframes slideIn{from{opacity:0;transform:translateX(-16px)}to{opacity:1;transform:translateX(0)}}
.timeline-dot{position:absolute;left:-27px;width:16px;height:16px;border-radius:50%;background:var(--grad);border:3px solid white;box-shadow:0 0 0 2px var(--p),0 4px 10px rgba(29,106,229,0.3);top:4px}
.timeline-month-title{font-family:'Bricolage Grotesque',sans-serif;font-size:16px;font-weight:800;color:var(--text);margin-bottom:14px;display:flex;align-items:center;gap:8px}
.timeline-section{margin-bottom:12px}
.timeline-section-title{font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:6px;display:flex;align-items:center;gap:6px}
.timeline-items{display:flex;flex-wrap:wrap;gap:6px}
.timeline-chip{background:var(--p4);border:1px solid var(--border);color:var(--p3);border-radius:20px;padding:4px 12px;font-size:12px;font-weight:600;animation:popIn 0.3s ease both}
@keyframes popIn{from{opacity:0;transform:scale(0.8)}to{opacity:1;transform:scale(1)}}

/* ── ROADMAP MONTH PROGRESS ── */
.month-progress-bar{height:6px;background:var(--border2);border-radius:6px;overflow:hidden;margin-top:8px;margin-bottom:16px}
.month-progress-fill{height:100%;border-radius:6px;transition:width 1.2s cubic-bezier(0.16,1,0.3,1)}

/* ── ANALYSIS SECTIONS ── */
.analysis-section{border-radius:14px;padding:18px 20px;margin-bottom:14px;border:1px solid var(--border);animation:fadeUp 0.5s ease both}
.analysis-section.strength{background:linear-gradient(135deg,rgba(5,150,105,0.05),rgba(16,185,129,0.03));border-color:rgba(5,150,105,0.2)}
.analysis-section.missing{background:linear-gradient(135deg,rgba(220,38,38,0.05),rgba(248,113,113,0.03));border-color:rgba(220,38,38,0.15)}
.analysis-section.summary{background:linear-gradient(135deg,var(--p5),rgba(219,234,254,0.4));border-color:var(--border)}
.analysis-item{display:flex;gap:12px;padding:12px 0;border-bottom:1px solid rgba(0,0,0,0.05)}
.analysis-item:last-child{border-bottom:none;padding-bottom:0}
.analysis-num{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Bricolage Grotesque',sans-serif;font-weight:800;font-size:12px;flex-shrink:0;margin-top:1px}
.analysis-num.str{background:rgba(5,150,105,0.12);color:#059669}
.analysis-num.mis{background:rgba(220,38,38,0.1);color:#dc2626}
.analysis-body{flex:1}
.analysis-skill-name{font-family:'Bricolage Grotesque',sans-serif;font-weight:700;font-size:14px;color:var(--text);margin-bottom:3px}
.analysis-skill-why{font-size:12px;color:var(--muted);line-height:1.6;margin-bottom:6px}
.analysis-meta{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px}
.analysis-tag{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:600;padding:3px 10px;border-radius:20px;border:1px solid}
.analysis-tag.learn{background:rgba(29,106,229,0.07);color:var(--p);border-color:rgba(29,106,229,0.2)}
.analysis-tag.time{background:rgba(14,165,233,0.07);color:#0369a1;border-color:rgba(14,165,233,0.2)}
.analysis-tag.leverage{background:rgba(139,92,246,0.07);color:#7c3aed;border-color:rgba(139,92,246,0.2)}

/* ── ML CONFIDENCE PANEL ── */
.conf-panel{border-radius:16px;padding:20px;border:1.5px solid;margin-bottom:20px;position:relative;overflow:hidden;animation:fadeUp 0.5s ease both}
.conf-panel.high{background:linear-gradient(135deg,rgba(5,150,105,0.06),rgba(16,185,129,0.03));border-color:rgba(5,150,105,0.25)}
.conf-panel.medium{background:linear-gradient(135deg,rgba(245,158,11,0.07),rgba(251,191,36,0.04));border-color:rgba(245,158,11,0.3)}
.conf-panel.low{background:linear-gradient(135deg,rgba(220,38,38,0.07),rgba(248,113,113,0.04));border-color:rgba(220,38,38,0.2)}
.conf-panel::before{content:'';position:absolute;top:-30px;right:-30px;width:120px;height:120px;border-radius:50%;opacity:0.07}
.conf-panel.high::before{background:#059669}
.conf-panel.medium::before{background:#f59e0b}
.conf-panel.low::before{background:#dc2626}

.conf-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:10px}
.conf-title{font-family:'Bricolage Grotesque',sans-serif;font-size:14px;font-weight:800;color:var(--text);display:flex;align-items:center;gap:8px}
.conf-score-big{font-family:'Bricolage Grotesque',sans-serif;font-size:32px;font-weight:800;line-height:1}
.conf-score-big.high{color:#059669}
.conf-score-big.medium{color:#d97706}
.conf-score-big.low{color:#dc2626}

.conf-bar-track{height:8px;background:rgba(0,0,0,0.07);border-radius:8px;overflow:hidden;margin:8px 0 14px}
.conf-bar-fill{height:100%;border-radius:8px;transition:width 1.4s cubic-bezier(0.16,1,0.3,1)}
.conf-bar-fill.high{background:linear-gradient(90deg,#059669,#34d399)}
.conf-bar-fill.medium{background:linear-gradient(90deg,#d97706,#fbbf24)}
.conf-bar-fill.low{background:linear-gradient(90deg,#dc2626,#f87171)}

.conf-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px}
.conf-cell{background:rgba(255,255,255,0.7);border-radius:10px;padding:10px 12px;border:1px solid rgba(0,0,0,0.06);text-align:center}
.conf-cell-label{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:0.4px;margin-bottom:4px}
.conf-cell-val{font-family:'Bricolage Grotesque',sans-serif;font-size:14px;font-weight:800;color:var(--text)}

.conf-reason{font-size:12px;color:var(--muted);line-height:1.65;padding:10px 14px;background:rgba(255,255,255,0.6);border-radius:10px;margin-bottom:12px;border:1px solid rgba(0,0,0,0.05)}
.conf-rec{font-size:12px;font-weight:600;color:var(--text);line-height:1.6;display:flex;gap:8px;align-items:flex-start}
.conf-rec-icon{flex-shrink:0;font-size:15px;margin-top:1px}

.conf-skill-badge{display:inline-flex;align-items:center;gap:5px;font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;border:1px solid;margin-left:6px;vertical-align:middle}
.conf-skill-badge.high{background:rgba(5,150,105,0.1);color:#059669;border-color:rgba(5,150,105,0.2)}
.conf-skill-badge.medium{background:rgba(245,158,11,0.1);color:#d97706;border-color:rgba(245,158,11,0.2)}
.conf-skill-badge.low{background:rgba(220,38,38,0.1);color:#dc2626;border-color:rgba(220,38,38,0.2)}

.quality-bar-wrap{margin-top:10px}
.quality-label{display:flex;justify-content:space-between;font-size:11px;font-weight:700;color:var(--muted);margin-bottom:5px}
.quality-track{height:6px;background:rgba(0,0,0,0.07);border-radius:6px;overflow:hidden}
.quality-fill{height:100%;border-radius:6px;background:var(--grad);transition:width 1.2s cubic-bezier(0.16,1,0.3,1)}

.feedback-row{display:flex;align-items:center;gap:8px;margin-top:14px;padding-top:12px;border-top:1px solid rgba(0,0,0,0.07)}
.feedback-label{font-size:11px;color:var(--muted);font-weight:600;flex:1}
.feedback-btn{background:none;border:1.5px solid var(--border);border-radius:8px;padding:5px 12px;font-size:13px;cursor:pointer;transition:all 0.15s}
.feedback-btn:hover{transform:scale(1.1)}
.feedback-btn.voted{opacity:0.5;cursor:default;transform:none}

/* ── PROJECT CARDS ── */
.proj-card{background:white;border-radius:16px;border:1px solid var(--border);overflow:hidden;transition:all 0.25s;box-shadow:var(--shadow);animation:fadeUp 0.5s ease both}
.proj-card:hover{transform:translateY(-4px);box-shadow:var(--shadow-lg);border-color:var(--p2)}
.proj-card-header{padding:18px 20px 14px;border-bottom:1px solid var(--border2)}
.proj-card-body{padding:16px 20px}
.proj-card-footer{padding:12px 20px;background:var(--p5);border-top:1px solid var(--border2);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
.proj-step{display:flex;gap:10px;padding:6px 0;font-size:12px;color:var(--muted);align-items:flex-start;line-height:1.5}
.proj-step-num{width:20px;height:20px;border-radius:50%;background:var(--grad);color:white;font-size:10px;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}

/* ── CHIP ── */
.chip{display:inline-block;background:var(--p4);border:1px solid var(--border);color:var(--p3);border-radius:20px;padding:4px 12px;font-size:12px;font-weight:600;margin:3px}

/* ── INFO ROW ── */
.info-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border2);font-size:14px}
.info-row:last-child{border-bottom:none}
.info-l{color:var(--muted);font-weight:600;width:110px;flex-shrink:0;font-size:13px}
.info-v{color:var(--text);font-weight:700}

/* ══════════════════════════════════════
   LANDING PAGE
══════════════════════════════════════ */
.lp-root{min-height:100vh;background:#f0f6ff;overflow-x:hidden;font-family:'Plus Jakarta Sans',sans-serif}

/* NAV */
.lp-nav{position:fixed;top:0;left:0;right:0;z-index:100;padding:0 5%;height:70px;display:flex;align-items:center;justify-content:space-between;background:rgba(240,246,255,0.85);backdrop-filter:blur(18px);border-bottom:1px solid rgba(199,217,245,0.5)}
.lp-logo{display:flex;align-items:center;gap:10px}
.lp-logo-icon{width:36px;height:36px;background:var(--grad);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;box-shadow:0 4px 12px rgba(29,106,229,0.3)}
.lp-logo-text{font-family:'Bricolage Grotesque',sans-serif;font-size:17px;font-weight:800;color:var(--text)}
.lp-nav-links{display:flex;align-items:center;gap:6px}
.lp-nav-link{background:none;border:none;cursor:pointer;padding:8px 16px;border-radius:8px;font-family:'Plus Jakarta Sans',sans-serif;font-size:14px;font-weight:600;color:var(--muted);transition:all 0.2s}
.lp-nav-link:hover{color:var(--p);background:var(--p5)}
.lp-nav-cta{background:var(--grad);color:white;border:none;cursor:pointer;padding:9px 20px;border-radius:9px;font-family:'Bricolage Grotesque',sans-serif;font-size:14px;font-weight:700;transition:all 0.2s;box-shadow:0 2px 8px rgba(29,106,229,0.3)}
.lp-nav-cta:hover{transform:translateY(-1px);box-shadow:0 6px 18px rgba(29,106,229,0.4)}

/* HERO */
.lp-hero{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:100px 5% 80px;position:relative;overflow:hidden}
.lp-hero-bg{position:absolute;inset:0;pointer-events:none}
.lp-orb{position:absolute;border-radius:50%;filter:blur(90px);opacity:0.45}
.lp-orb-1{width:600px;height:600px;top:-150px;left:-150px;background:radial-gradient(circle,#bfcfff,#dde8ff);animation:lpFloat 16s ease-in-out infinite alternate}
.lp-orb-2{width:500px;height:500px;bottom:-100px;right:-120px;background:radial-gradient(circle,#c7e8ff,#e6f4ff);animation:lpFloat 20s ease-in-out infinite alternate-reverse}
.lp-orb-3{width:300px;height:300px;top:40%;left:55%;background:radial-gradient(circle,#a5c8ff,#d4e8ff);animation:lpFloat 12s ease-in-out infinite alternate}
@keyframes lpFloat{0%{transform:translate(0,0) scale(1)}100%{transform:translate(25px,20px) scale(1.07)}}
.lp-grid-bg{position:absolute;inset:0;background-image:linear-gradient(rgba(29,106,229,0.04) 1px,transparent 1px),linear-gradient(90deg,rgba(29,106,229,0.04) 1px,transparent 1px);background-size:50px 50px}

.lp-hero-inner{position:relative;z-index:1;text-align:center;max-width:820px;margin:0 auto}
.lp-badge{display:inline-flex;align-items:center;gap:8px;background:rgba(29,106,229,0.08);border:1px solid rgba(29,106,229,0.2);color:var(--p);border-radius:30px;padding:6px 16px;font-size:12px;font-weight:700;letter-spacing:0.5px;text-transform:uppercase;margin-bottom:24px;animation:fadeUp 0.6s ease both}
.lp-badge-dot{width:7px;height:7px;background:var(--p);border-radius:50%;animation:lpPulse 1.5s ease-in-out infinite}
@keyframes lpPulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.5;transform:scale(0.7)}}
.lp-h1{font-family:'Bricolage Grotesque',sans-serif;font-size:clamp(40px,6vw,76px);font-weight:800;color:var(--text);line-height:1.08;letter-spacing:-2px;margin-bottom:22px;animation:fadeUp 0.6s ease 0.1s both}
.lp-h1-grad{background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.lp-sub{font-size:clamp(16px,2vw,20px);color:var(--muted);line-height:1.65;max-width:600px;margin:0 auto 36px;animation:fadeUp 0.6s ease 0.2s both}
.lp-hero-btns{display:flex;align-items:center;justify-content:center;gap:14px;flex-wrap:wrap;animation:fadeUp 0.6s ease 0.3s both}
.lp-btn-primary{display:flex;align-items:center;gap:8px;background:var(--grad);color:white;border:none;cursor:pointer;padding:15px 30px;border-radius:12px;font-family:'Bricolage Grotesque',sans-serif;font-size:16px;font-weight:700;transition:all 0.2s;box-shadow:0 4px 16px rgba(29,106,229,0.35)}
.lp-btn-primary:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(29,106,229,0.45)}
.lp-btn-secondary{display:flex;align-items:center;gap:8px;background:white;color:var(--text);border:1.5px solid var(--border);cursor:pointer;padding:15px 28px;border-radius:12px;font-family:'Bricolage Grotesque',sans-serif;font-size:16px;font-weight:700;transition:all 0.2s;box-shadow:var(--shadow)}
.lp-btn-secondary:hover{transform:translateY(-2px);border-color:var(--p);color:var(--p);box-shadow:var(--shadow-md)}
.lp-trust{display:flex;align-items:center;justify-content:center;gap:20px;margin-top:44px;flex-wrap:wrap;animation:fadeUp 0.6s ease 0.4s both}
.lp-trust-item{display:flex;align-items:center;gap:7px;font-size:13px;font-weight:600;color:var(--muted)}
.lp-trust-icon{font-size:16px}

/* HERO CARD PREVIEW */
.lp-hero-preview{position:relative;margin-top:64px;animation:fadeUp 0.7s ease 0.5s both}
.lp-preview-card{background:white;border-radius:20px;border:1px solid var(--border);box-shadow:0 20px 60px rgba(29,106,229,0.12),0 4px 16px rgba(29,106,229,0.08);padding:24px;max-width:720px;margin:0 auto;overflow:hidden}
.lp-preview-bar{display:flex;gap:6px;margin-bottom:18px}
.lp-preview-dot{width:10px;height:10px;border-radius:50%}
.lp-preview-row{display:flex;gap:12px;margin-bottom:12px;align-items:center}
.lp-preview-label{font-size:11px;font-weight:700;color:var(--muted);width:90px;flex-shrink:0}
.lp-preview-track{flex:1;height:8px;background:var(--border2);border-radius:8px;overflow:hidden}
.lp-preview-fill{height:100%;border-radius:8px;animation:previewGrow 1.5s cubic-bezier(0.16,1,0.3,1) both}
@keyframes previewGrow{from{width:0}to{width:var(--w)}}

/* STATS STRIP */
.lp-stats{padding:60px 5%;background:white;border-top:1px solid var(--border2);border-bottom:1px solid var(--border2)}
.lp-stats-inner{max-width:1100px;margin:0 auto;display:flex;gap:0;justify-content:space-evenly;flex-wrap:wrap}
.lp-stat{text-align:center;padding:24px 32px}
.lp-stat-num{font-family:'Bricolage Grotesque',sans-serif;font-size:40px;font-weight:800;background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1}
.lp-stat-label{font-size:13px;color:var(--muted);font-weight:600;margin-top:6px}

/* FEATURES */
.lp-features{padding:100px 5%;max-width:1200px;margin:0 auto}
.lp-section-label{font-size:12px;font-weight:700;color:var(--p);text-transform:uppercase;letter-spacing:1px;margin-bottom:12px;text-align:center}
.lp-section-title{font-family:'Bricolage Grotesque',sans-serif;font-size:clamp(28px,4vw,44px);font-weight:800;color:var(--text);text-align:center;line-height:1.15;margin-bottom:16px}
.lp-section-sub{font-size:16px;color:var(--muted);text-align:center;max-width:540px;margin:0 auto 60px;line-height:1.6}
.lp-feat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:20px}
.lp-feat-card{background:white;border:1px solid var(--border);border-radius:18px;padding:28px;transition:all 0.25s;position:relative;overflow:hidden}
.lp-feat-card:hover{transform:translateY(-5px);box-shadow:var(--shadow-lg);border-color:var(--p2)}
.lp-feat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--grad);transform:scaleX(0);transition:transform 0.3s ease;transform-origin:left}
.lp-feat-card:hover::before{transform:scaleX(1)}
.lp-feat-icon{width:52px;height:52px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:26px;margin-bottom:16px}
.lp-feat-title{font-family:'Bricolage Grotesque',sans-serif;font-size:17px;font-weight:800;color:var(--text);margin-bottom:8px}
.lp-feat-desc{font-size:13px;color:var(--muted);line-height:1.7}

/* HOW IT WORKS */
.lp-how{padding:100px 5%;background:white}
.lp-how-inner{max-width:1100px;margin:0 auto}
.lp-steps-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:0;position:relative;margin-top:60px}
.lp-steps-row::before{content:'';position:absolute;top:36px;left:10%;right:10%;height:2px;background:linear-gradient(90deg,var(--p),var(--acc));z-index:0}
.lp-step{text-align:center;padding:0 20px;position:relative;z-index:1}
.lp-step-num{width:72px;height:72px;border-radius:50%;background:white;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;margin:0 auto 18px;font-size:28px;box-shadow:var(--shadow-md);transition:all 0.25s}
.lp-step:hover .lp-step-num{transform:scale(1.1);border-color:var(--p);box-shadow:0 0 0 6px rgba(29,106,229,0.1)}
.lp-step-title{font-family:'Bricolage Grotesque',sans-serif;font-size:15px;font-weight:800;color:var(--text);margin-bottom:8px}
.lp-step-desc{font-size:12px;color:var(--muted);line-height:1.6}

/* TESTIMONIALS */
.lp-testi{padding:100px 5%}
.lp-testi-inner{max-width:1200px;margin:0 auto}
.lp-testi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:20px;margin-top:60px}
.lp-testi-card{background:white;border:1px solid var(--border);border-radius:18px;padding:28px;position:relative;transition:all 0.25s}
.lp-testi-card:hover{transform:translateY(-4px);box-shadow:var(--shadow-lg)}
.lp-testi-card::before{content:'\201C';font-family:'Bricolage Grotesque',sans-serif;font-size:80px;color:var(--p4);position:absolute;top:8px;left:20px;line-height:1}
.lp-testi-text{font-size:14px;color:var(--text);line-height:1.75;margin-bottom:20px;padding-top:32px;font-style:italic}
.lp-testi-author{display:flex;align-items:center;gap:12px}
.lp-testi-avatar{width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Bricolage Grotesque',sans-serif;font-weight:800;font-size:16px;color:white;flex-shrink:0}
.lp-testi-name{font-family:'Bricolage Grotesque',sans-serif;font-size:14px;font-weight:800;color:var(--text)}
.lp-testi-role{font-size:12px;color:var(--muted)}
.lp-stars{color:#f59e0b;font-size:13px;margin-bottom:4px;letter-spacing:2px}

/* CTA SECTION */
.lp-cta-section{padding:100px 5%;background:var(--grad);position:relative;overflow:hidden;text-align:center}
.lp-cta-section::before{content:'';position:absolute;top:-50%;left:-50%;width:200%;height:200%;background:radial-gradient(circle at 30% 50%,rgba(255,255,255,0.08),transparent 50%),radial-gradient(circle at 70% 50%,rgba(255,255,255,0.05),transparent 50%)}
.lp-cta-title{font-family:'Bricolage Grotesque',sans-serif;font-size:clamp(28px,4vw,52px);font-weight:800;color:white;line-height:1.1;margin-bottom:16px;position:relative}
.lp-cta-sub{font-size:17px;color:rgba(255,255,255,0.75);max-width:480px;margin:0 auto 36px;line-height:1.6;position:relative}
.lp-cta-btn{display:inline-flex;align-items:center;gap:10px;background:white;color:var(--p);border:none;cursor:pointer;padding:16px 36px;border-radius:12px;font-family:'Bricolage Grotesque',sans-serif;font-size:17px;font-weight:800;transition:all 0.2s;box-shadow:0 8px 32px rgba(0,0,0,0.15);position:relative}
.lp-cta-btn:hover{transform:translateY(-2px) scale(1.02);box-shadow:0 14px 40px rgba(0,0,0,0.2)}

/* FOOTER */
.lp-footer{background:var(--text);color:rgba(255,255,255,0.6);padding:40px 5%;text-align:center}
.lp-footer-logo{font-family:'Bricolage Grotesque',sans-serif;font-size:20px;font-weight:800;color:white;margin-bottom:12px;display:flex;align-items:center;justify-content:center;gap:10px}
.lp-footer-links{display:flex;justify-content:center;gap:24px;margin-bottom:20px;flex-wrap:wrap}
.lp-footer-link{color:rgba(255,255,255,0.5);font-size:13px;font-weight:600;cursor:pointer;transition:color 0.15s;background:none;border:none}
.lp-footer-link:hover{color:white}
.lp-footer-copy{font-size:12px;color:rgba(255,255,255,0.3)}

/* CHAT FLOAT BTN */
.float-btn{
  position:fixed;bottom:28px;right:28px;width:58px;height:58px;border-radius:50%;
  background:var(--grad);display:flex;align-items:center;justify-content:center;font-size:24px;
  cursor:pointer;box-shadow:0 4px 16px rgba(29,106,229,0.4),0 0 0 4px rgba(29,106,229,0.1);
  transition:all 0.25s;z-index:9999;border:3px solid white;
}
.float-btn:hover{transform:translateY(-4px) scale(1.08);box-shadow:0 8px 24px rgba(29,106,229,0.5),0 0 0 6px rgba(29,106,229,0.1)}
.chat-badge{position:absolute;top:-3px;right:-3px;width:18px;height:18px;background:var(--err);border-radius:50%;border:2px solid white;font-size:10px;font-weight:700;color:white;display:flex;align-items:center;justify-content:center}

/* ── CHAT MODAL ── */
.chat-modal{
  position:fixed;bottom:98px;right:28px;width:365px;height:510px;
  background:white;border:1px solid var(--border);border-radius:20px;
  box-shadow:var(--shadow-lg);
  display:flex;flex-direction:column;overflow:hidden;z-index:9999;
  animation:fadeUp 0.25s cubic-bezier(0.16,1,0.3,1);
}
.chat-head{
  background:var(--grad3);
  padding:16px 18px;display:flex;align-items:center;gap:10px;
  border-bottom:1px solid rgba(255,255,255,0.1);
}
.chat-head-ico{width:34px;height:34px;background:rgba(255,255,255,0.2);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:17px}
.chat-head h3{font-family:'Bricolage Grotesque',sans-serif;font-size:14px;font-weight:800;color:white;flex:1}
.chat-head p{font-size:11px;color:rgba(255,255,255,0.7)}
.chat-close{background:none;border:none;color:rgba(255,255,255,0.7);cursor:pointer;font-size:17px;transition:color 0.15s}
.chat-close:hover{color:white}
.chat-body{flex:1;padding:14px;overflow-y:auto;background:var(--p5)}

// ── API base: auto-detects whether you are running locally or deployed ──
const API = window.location.hostname === "localhost" || window.location.hostname === "127.0.0.1"
  ? "http://localhost:8000"          // local dev
  : window.location.origin;         // same server when deployed

async function apiFetch(path, opts={}) {
  const token = localStorage.getItem("token");
  const isForm = opts.body instanceof FormData;
  const headers = {
    ...(token ? {Authorization:`Bearer ${token}`} : {}),
    ...(!isForm ? {"Content-Type":"application/json"} : {}),
    ...(opts.headers||{})
  };
  try {
    const res = await fetch(API+path, {...opts, headers});
    if (!res.ok) {
      let errMsg = "Request failed";
      try { const e = await res.json(); errMsg = e.detail || e.message || errMsg; } catch {}
      throw new Error(errMsg);
    }
    return res.json();
  } catch(e) {
    // Give a clear message instead of raw "Failed to fetch"
    if (e.message === "Failed to fetch" || e.name === "TypeError") {
      throw new Error("Cannot connect to server. Make sure the backend is running on port 8000.");
    }
    throw e;
  }
}

      localStorage.setItem("is_verified", data.is_verified?"1":"0");
      localStorage.setItem("is_admin",    data.is_admin?"1":"0");

    } catch(e){ setErr(e.message||"Invalid email or password."); }
    finally{ setLoading(false); }
  };

  const doRegister = async () => {
    setErr(""); setOk("");
    if(!name.trim())                        return setErr("Please enter your full name.");
    if(!email.trim()||!email.includes("@")) return setErr("Please enter a valid email address.");

/* ── ANIMATED SKILL BAR ─────────────── */
function SkillBar({name, level, type="have", target, delay=0}) {
  const [width, setWidth] = useState(0);
  useEffect(()=>{const t=setTimeout(()=>setWidth(level||target||0),delay+100);return()=>clearTimeout(t)},[level,target,delay]);
  const pct = type==="have" ? level : (target||75);
  return (
    <div className="skill-bar-wrap">
      <div className="skill-bar-header">
        <span className="skill-bar-name">{name}</span>
        <span className="skill-bar-pct" style={{color:type==="have"?"#34d399":"#f87171"}}>{pct}%</span>
      </div>
      <div className="skill-bar-track">
        <div className={`skill-bar-fill ${type}`} style={{width:width+"%", transitionDelay:delay+"ms"}}/>
      </div>
    </div>
  );
}

/* ── MATCH SCORE RING ───────────────── */
function ScoreRing({score}) {
  const [s, setS] = useState(0);
  useEffect(()=>{const t=setTimeout(()=>setS(score),200);return()=>clearTimeout(t)},[score]);
  const r=50; const circ=2*Math.PI*r; const dash=circ*(s/100);
  const color = s>=70?"#10b981":s>=50?"#f59e0b":"#ef4444";
  return (
    <div className="score-ring">
      <svg width="120" height="120" viewBox="0 0 120 120">
        <circle cx="60" cy="60" r={r} fill="none" stroke="rgba(255,255,255,0.05)" strokeWidth="12"/>
        <circle cx="60" cy="60" r={r} fill="none" stroke={color} strokeWidth="12"
          strokeDasharray={`${dash} ${circ}`} strokeLinecap="round"
          style={{transition:"stroke-dasharray 1.2s cubic-bezier(0.16,1,0.3,1)"}}/>
      </svg>
      <div className="score-ring-text">
        <span className="score-num" style={{color}}>{s}%</span>
        <span className="score-label">Match</span>
      </div>
    </div>
  );
}

function ConfidencePanel({confidence, role, user}) {
  const [width, setWidth]       = useState(0);
  const [qualW, setQualW]       = useState(0);
  const [feedback, setFeedback] = useState(null);
  const [fbMsg, setFbMsg]       = useState("");
  const ref = React.useRef(null);

  React.useEffect(()=>{
    const obs = new IntersectionObserver(([e])=>{
      if(e.isIntersecting){
        setTimeout(()=>setWidth(confidence.trust_score ?? confidence.overall_confidence), 200);
        setTimeout(()=>setQualW(confidence.resume_quality_score ?? 0), 350);
        obs.disconnect();
      }
    },{threshold:0.2});
    if(ref.current) obs.observe(ref.current);
    return ()=>obs.disconnect();
  },[confidence]);

  const lvl = (confidence.reliability||confidence.confidence_level||"Medium").toLowerCase();

    if(feedback) return;
    setFeedback(rating===1?"up":"down");

  const skillConfs  = confidence.skill_confidences || {};
  const skillLevel  = v => v>=75?"high":v>=50?"medium":"low";
  const skillEmoji  = v => v>=75?"✅":v>=50?"🟡":"⚠️";
  const cellIcon    = v => v==="High"?"✅":v==="Medium"?"🟡":"⚠️";

      </div>

      <div className="conf-bar-track">
        <div className={`conf-bar-fill ${lvl}`} style={{width:width+"%"}}/>
      </div>

      {/* 3-cell summary grid */}
      <div className="conf-grid">
        <div className="conf-cell">
          <div className="conf-cell-label">Skill Match</div>
          <div className="conf-cell-val">{confidence.skill_match ?? "--"}%</div>
        </div>
        <div className="conf-cell">
          <div className="conf-cell-label">Roadmap Quality</div>
          <div className="conf-cell-val">{confidence.roadmap_quality ?? "--"}%</div>

      {/* Per-skill confidences */}
      {Object.keys(skillConfs).length>0&&(
        <div style={{marginBottom:14}}>
          <div style={{fontSize:11,fontWeight:700,color:"var(--muted)",textTransform:"uppercase",letterSpacing:"0.4px",marginBottom:8}}>How confident is the model about each missing skill?</div>
          <div style={{display:"flex",flexWrap:"wrap",gap:7}}>
            {Object.entries(skillConfs).map(([skill,val])=>(
              <div key={skill} style={{display:"flex",alignItems:"center",gap:6,background:"rgba(255,255,255,0.75)",borderRadius:9,padding:"6px 12px",border:"1px solid rgba(0,0,0,0.07)",boxShadow:"0 1px 3px rgba(0,0,0,0.04)"}}>

          <button className={`feedback-btn${feedback==="up"?" voted":""}`} onClick={()=>sendFeedback(1)} title="Yes, accurate">👍</button>

        </>}

  );
}

/* ── ANALYSIS RENDERER ──────────────── */
function AnalysisRenderer({text}) {
  if (!text) return null;

  // Parse strengths
  const strengthBlock = text.match(/TOP 5 STRENGTHS:([\s\S]*?)(?=TOP 5 MISSING|OVERALL SUMMARY|$)/i)?.[1] || "";
  const missingBlock  = text.match(/TOP 5 MISSING SKILLS:([\s\S]*?)(?=OVERALL SUMMARY|MARKET_JSON|$)/i)?.[1] || "";
  const summaryBlock  = text.match(/OVERALL SUMMARY:([\s\S]*?)(?=MARKET_JSON|PROJECTS_JSON|SKILLS_DATA|$)/i)?.[1]?.trim() || "";

  function parseItems(block, type) {
    const items = [];
    const chunks = block.split(/\n(?=\d+\.)/);
    chunks.forEach(chunk => {
      const titleMatch = chunk.match(/^\d+\.\s+\*\*(.+?)\*\*[:\-–]?\s*(.+?)(?:\n|$)/);
      if (!titleMatch) return;
      const name = titleMatch[1].replace(/\*\*/g,"").trim();
      const why  = titleMatch[2].replace(/\*\*/g,"").trim();
      const learnMatch    = chunk.match(/Learn:?\s*(.+)/i);
      const timelineMatch = chunk.match(/Timeline:?\s*(.+)/i);
      const leverageMatch = chunk.match(/How to leverage:?\s*(.+)/i);
      const matterMatch   = chunk.match(/Why it matters:?\s*(.+)/i);
      items.push({name, why, learn: learnMatch?.[1], timeline: timelineMatch?.[1], leverage: leverageMatch?.[1], matters: matterMatch?.[1]});
    });
    return items;
  }

  const strengths = parseItems(strengthBlock, "str");
  const missing   = parseItems(missingBlock,   "mis");

  // Animated item wrapper
  function Item({item, type, index}) {
    const [vis, setVis] = React.useState(false);
    const ref = React.useRef(null);
    React.useEffect(()=>{
      const el = ref.current; if(!el) return;
      const obs = new IntersectionObserver(([e])=>{ if(e.isIntersecting){setVis(true);obs.disconnect();} },{threshold:0.1});
      obs.observe(el); return ()=>obs.disconnect();
    },[]);
    return (
      <div ref={ref} className="analysis-item" style={{opacity:vis?1:0, transform:vis?"translateX(0)":"translateX(-12px)", transition:`opacity 0.4s ease ${index*80}ms, transform 0.4s ease ${index*80}ms`}}>

          </div>
        </div>
      </div>
    );
  }

  return (
    <div>
      {strengths.length>0 && (
        <div className="analysis-section strength" style={{animationDelay:"0.1s"}}>
          <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:14}}>
            <span style={{fontSize:20}}>💪</span>

      {missing.length>0 && (

          <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:14}}>
            <span style={{fontSize:20}}>🎯</span>
            <div>
              <div style={{fontFamily:"'Bricolage Grotesque',sans-serif",fontWeight:800,fontSize:15,color:"#991b1b"}}>Skills to Acquire</div>
              <div style={{fontSize:12,color:"#dc2626"}}>Critical gaps between your profile and the role</div>
            </div>
          </div>
          {missing.map((item,i)=><Item key={i} item={item} type="mis" index={i}/>)}
        </div>
      )}

      {summaryBlock && (
        <div className="analysis-section summary" style={{animationDelay:"0.3s"}}>
          <div style={{display:"flex",gap:12,alignItems:"flex-start"}}>
            <span style={{fontSize:22,flexShrink:0}}>📌</span>
            <div>
              <div style={{fontFamily:"'Bricolage Grotesque',sans-serif",fontWeight:800,fontSize:14,marginBottom:6,color:"var(--text)"}}>Overall Summary</div>

        </div>
      )}

      {(strengths.length===0 && missing.length===0) && (
        <pre style={{whiteSpace:"pre-wrap",fontSize:13,lineHeight:1.8,color:"var(--text)",background:"var(--p5)",padding:16,borderRadius:12,overflowX:"auto"}}>{text}</pre>
      )}

  );
}

function RoadmapTimeline({text}) {
  const months = [];
  const parts = text.split(/MONTH\s+\d+/i).filter(Boolean);
  const monthNums = [...text.matchAll(/MONTH\s+(\d+)/gi)].map(m=>m[1]);

  parts.forEach((part,i)=>{
    const sections = {};
    const lines = part.split('\n').filter(Boolean);
    let currentSection = null;
    lines.forEach(line=>{
      const trimmed = line.trim();
      if (trimmed.match(/^[📚📖⭐💼]/u)) { currentSection = trimmed; sections[currentSection]=[]; }
      else if (trimmed.startsWith('-') && currentSection) { sections[currentSection].push(trimmed.replace(/^-\s*/,'')); }
    });
    months.push({num:monthNums[i]||String(i+1), sections});
  });

  const monthConfig = [
    {color:"#6366f1", color2:"#818cf8", label:"Foundation", progress:33,  icon:"🌱", desc:"Build core fundamentals"},
    {color:"#8b5cf6", color2:"#a78bfa", label:"Building",    progress:66,  icon:"🔨", desc:"Develop key skills"},
    {color:"#0ea5e9", color2:"#38bdf8", label:"Advanced",    progress:100, icon:"🚀", desc:"Master & apply skills"},
  ];

  const [visibleMonths, setVisibleMonths] = React.useState([]);
  const refs = React.useRef([]);

  React.useEffect(()=>{
    const observers = months.map((_,i)=>{
      const obs = new IntersectionObserver(([e])=>{
        if(e.isIntersecting){ setVisibleMonths(prev=>prev.includes(i)?prev:[...prev,i]); obs.disconnect(); }
      },{threshold:0.15});
      if(refs.current[i]) obs.observe(refs.current[i]);
      return obs;
    });
    return ()=>observers.forEach(o=>o.disconnect());
  },[months.length]);

  return (
    <div>
      {/* Progress overview */}
      <div style={{display:"flex",gap:8,marginBottom:28,flexWrap:"wrap"}}>
        {months.map((m,mi)=>{
          const cfg = monthConfig[mi]||monthConfig[2];
          const vis = visibleMonths.includes(mi);
          return (
            <div key={mi} style={{flex:1,minWidth:140,background:`linear-gradient(135deg,${cfg.color}12,${cfg.color2}08)`,border:`1px solid ${cfg.color}25`,borderRadius:12,padding:"12px 14px"}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
                <span style={{fontFamily:"'Bricolage Grotesque',sans-serif",fontWeight:700,fontSize:13,color:cfg.color}}>{cfg.icon} Month {m.num}</span>
                <span style={{fontFamily:"'Bricolage Grotesque',sans-serif",fontWeight:800,fontSize:13,color:cfg.color}}>{cfg.progress}%</span>
              </div>
              <div className="month-progress-bar">
                <div className="month-progress-fill" style={{width:vis?cfg.progress+"%":"0%",background:`linear-gradient(90deg,${cfg.color},${cfg.color2})`}}/>
              </div>
              <div style={{fontSize:11,color:"var(--muted)",fontWeight:600}}>{cfg.label}</div>
            </div>
          );
        })}
      </div>

      {/* Timeline */}
      <div className="timeline">
        {months.map((month,mi)=>{
          const cfg = monthConfig[mi]||monthConfig[2];
          const vis = visibleMonths.includes(mi);
          return (
            <div key={mi} ref={el=>refs.current[mi]=el} className="timeline-month"
              style={{animationDelay:`${mi*0.15}s`, opacity:vis?1:0, transform:vis?"translateX(0)":"translateX(-20px)", transition:`opacity 0.5s ease ${mi*150}ms, transform 0.5s ease ${mi*150}ms`}}>
              <div className="timeline-dot" style={{background:`linear-gradient(135deg,${cfg.color},${cfg.color2})`}}/>
              <div className="timeline-month-title">
                <span style={{fontSize:18}}>{cfg.icon}</span>
                <span style={{background:`linear-gradient(135deg,${cfg.color},${cfg.color2})`,WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>Month {month.num} — {cfg.label}</span>
                <span style={{background:`${cfg.color}15`,color:cfg.color,fontSize:11,fontWeight:700,padding:"3px 10px",borderRadius:20,border:`1px solid ${cfg.color}25`,fontFamily:"'Plus Jakarta Sans',sans-serif"}}>{cfg.desc}</span>
              </div>
              {Object.entries(month.sections).map(([sec,items],si)=>(
                items.length>0 && (
                  <div key={si} className="timeline-section">
                    <div className="timeline-section-title">{sec}</div>
                    <div className="timeline-items">
                      {items.map((item,ii)=>(
                        <span key={ii} className="timeline-chip" style={{animationDelay:`${(mi*0.15)+(si*0.05)+(ii*0.03)}s`,background:si===0?`${cfg.color}12`:si===1?"var(--p4)":"rgba(14,165,233,0.08)",color:si===0?cfg.color:si===1?"var(--p3)":"#0369a1",borderColor:si===0?`${cfg.color}30`:"var(--border)"}}>{item}</span>
                      ))}
                    </div>
                  </div>
                )
              ))}
            </div>
          );
        })}
      </div>
    </div>
  );
}

function downloadSkillsPDF(role, score, analysisText, skillsData, profile) {

    doc.setFillColor(26,26,46);

  }

  // Score bar
  doc.setFontSize(12);
  doc.setFont('helvetica','bold');
  doc.setTextColor(29,106,229);
  doc.text(`Match Score: ${score}%`,margin,y); y+=6;
  doc.setFillColor(230,230,250);
  doc.roundedRect(margin,y,W-margin*2,8,2,2,'F');
  const barColor = score>=70?[16,185,129]:score>=50?[245,158,11]:[239,68,68];
  doc.setFillColor(...barColor);
  doc.roundedRect(margin,y,(W-margin*2)*(score/100),8,2,2,'F');
  y+=14;

  // Skills sections from text
  const lines = doc.splitTextToSize(analysisText, W-margin*2);
  doc.setFont('helvetica','normal');
  doc.setFontSize(10);
  doc.setTextColor(60,60,80);
  lines.forEach(line=>{
    if(y>270){doc.addPage();y=18}
    const trimmed = line.trim();
    if (trimmed.startsWith('TOP 5') || trimmed.startsWith('OVERALL')) {
      y+=4;
      doc.setFont('helvetica','bold');
      doc.setTextColor(29,106,229);
      doc.text(trimmed,margin,y);
      doc.setFont('helvetica','normal');
      doc.setTextColor(60,60,80);
    } else if (trimmed.startsWith('MATCH SCORE')) {
      // skip
    } else {
      doc.text(line,margin,y);
    }
    y+=5;
  });

  // Skills bars page
  if (skillsData?.have?.length || skillsData?.missing?.length) {
    doc.addPage(); y=18;
    doc.setFont('helvetica','bold');
    doc.setFontSize(14);
    doc.setTextColor(29,106,229);
    doc.text('Skills Breakdown',margin,y); y+=10;

    if (skillsData.have?.length) {
      doc.setFontSize(12);
      doc.setTextColor(16,185,129);
      doc.text('✓ Existing Skills',margin,y); y+=8;
      skillsData.have.forEach(sk=>{
        if(y>270){doc.addPage();y=18}
        doc.setFontSize(10);
        doc.setTextColor(60,60,80);
        doc.setFont('helvetica','normal');
        doc.text(sk.name,margin,y);
        doc.text(`${sk.level}%`,W-margin,y,{align:'right'});
        doc.setFillColor(209,250,229);
        doc.roundedRect(margin,y+2,W-margin*2-20,5,1,1,'F');
        doc.setFillColor(16,185,129);
        doc.roundedRect(margin,y+2,(W-margin*2-20)*(sk.level/100),5,1,1,'F');
        y+=12;
      });
      y+=4;
    }

    if (skillsData.missing?.length) {
      doc.setFontSize(12);
      doc.setTextColor(239,68,68);
      doc.text('✗ Skills to Acquire',margin,y); y+=8;
      skillsData.missing.forEach(sk=>{
        if(y>270){doc.addPage();y=18}
        doc.setFontSize(10);
        doc.setTextColor(60,60,80);
        doc.setFont('helvetica','normal');
        doc.text(sk.name,margin,y);
        doc.text(`Target: ${sk.target||75}%`,W-margin,y,{align:'right'});
        doc.setFillColor(219,234,254);
        doc.roundedRect(margin,y+2,W-margin*2-20,5,1,1,'F');
        doc.setFillColor(29,106,229);
        doc.roundedRect(margin,y+2,(W-margin*2-20)*((sk.target||75)/100),5,1,1,'F');
        y+=12;
      });
    }
  }

  doc.save(`skill-gap-${role.replace(/\s+/g,'-').toLowerCase()}.pdf`);
}

    doc.setFontSize(10);

  }

  const lines = roadmapText.split('\n');

      doc.roundedRect(margin,y-5,W-margin*2,10,2,2,'F');
      doc.setTextColor(255,255,255);
      doc.setFont('helvetica','bold');
      doc.setFontSize(13);
      doc.text(trimmed,margin+4,y+1);
      y+=12;
    } else if (trimmed.match(/^[📚📖⭐💼]/u)) {
      doc.setTextColor(29,106,229);
      doc.setFont('helvetica','bold');
      doc.setFontSize(10);
      doc.text(trimmed,margin,y);
      y+=6;
    } else if (trimmed.startsWith('-')) {

  doc.save(`roadmap-${role.replace(/\s+/g,'-').toLowerCase()}.pdf`);
}

/* ── FLOATING CHAT ──────────────────── */
function FloatingChat({user}) {
  const [open,setOpen]=useState(false);
  const [msgs,setMsgs]=useState([{s:"ai",t:`Hi ${user?user.name.split(" ")[0]:"there"} 👋 I'm your AI Career Mentor!\nAsk me about skills, resumes, interviews, or career paths.`}]);
  const [inp,setInp]=useState(""); const [typing,setTyping]=useState(false); const [unread,setUnread]=useState(0);
  const bodyRef=useRef(); const histRef=useRef([]);

  useEffect(()=>{if(bodyRef.current)bodyRef.current.scrollTop=bodyRef.current.scrollHeight},[msgs,typing]);
  useEffect(()=>{if(!open&&msgs.length>1)setUnread(p=>p+1)},[msgs]);

  const send = async ()=>{
    const text=inp.trim(); if(!text||typing) return;
    setInp(""); setMsgs(p=>[...p,{s:"user",t:text}]); setTyping(true);
    try {
      const token=localStorage.getItem("token");
      const headers={"Content-Type":"application/json",...(token?{Authorization:`Bearer ${token}`}:{})};
      const res=await fetch(API+"/chat",{method:"POST",headers,body:JSON.stringify({message:text,history:histRef.current.slice(-4)})});
      const data=await res.json();
      const reply=data.reply||"⚠️ No response.";
      setMsgs(p=>[...p,{s:"ai",t:reply}]);
      histRef.current.push({role:"user",content:text},{role:"assistant",content:reply});
    } catch { setMsgs(p=>[...p,{s:"ai",t:"⚠️ Connection error. Is the server running?"}]); }
    finally { setTyping(false); }
  };

  return (
    <>
      <div className="float-btn" onClick={()=>{setOpen(o=>!o);setUnread(0)}} title="AI Career Mentor">
        {open?"✖":"💬"}
        {!open&&unread>0&&<span className="chat-badge">{unread}</span>}
      </div>
      {open&&(
        <div className="chat-modal">
          <div className="chat-head">
            <div className="chat-head-ico">🤖</div>
            <div style={{flex:1}}>
              <h3>AI Career Mentor</h3>
              <p>🟢 Online — ask anything!</p>
            </div>
            <button className="chat-close" onClick={()=>setOpen(false)}>✖</button>
          </div>
          <div className="chat-body" ref={bodyRef}>
            {msgs.map((m,i)=>(
              <div key={i} className={`msg ${m.s}`}>
                <div className="msg-av">{m.s==="ai"?"🤖":"👤"}</div>
                <div className="bubble">{m.t}</div>
              </div>
            ))}
            {typing&&<div className="msg ai"><div className="msg-av">🤖</div><div className="typing"><span/><span/><span/></div></div>}
          </div>
          <div className="chat-inp">
            <input value={inp} onChange={e=>setInp(e.target.value)} onKeyDown={e=>e.key==="Enter"&&send()} placeholder="Ask about skills, career…" disabled={typing}/>
            <button className="chat-send" onClick={send} disabled={typing||!inp.trim()}>➤</button>
          </div>
        </div>
      )}
    </>
  );
}

function RoadmapPage({user}) {
  const [role,setRole]=useState(""); const [result,setResult]=useState(null); const [loading,setLoading]=useState(false); const [err,setErr]=useState("");
  const [confidence,setConfidence]=useState(null);

  const generate = async ()=>{
    if(!role.trim()) return setErr("Enter a target role.");
    setLoading(true); setErr(""); setResult(null); setConfidence(null);
    try {
      const data = await apiFetch(`/roadmap?role=${encodeURIComponent(role)}`);
      if(data.error) throw new Error(data.error);
      setResult(data);
      // Try to fetch confidence from the saved analysis for this role
      try {
        const analysis = await apiFetch(`/analyze?role=${encodeURIComponent(role)}`);
        if(analysis.confidence) setConfidence(analysis.confidence);
      } catch(e){ /* confidence not available yet, that's fine */ }
    } catch(e){setErr(e.message);}
    finally{setLoading(false);}
  };

  // Roadmap confidence banner component
  function RoadmapConfidenceBanner({conf, role}) {
    const [barW, setBarW] = useState(0);
    const [qualW, setQualW] = useState(0);
    const ref = React.useRef(null);
    React.useEffect(()=>{
      const obs = new IntersectionObserver(([e])=>{
        if(e.isIntersecting){
          setTimeout(()=>setBarW(conf.trust_score??conf.overall_confidence),150);
          setTimeout(()=>setQualW(conf.resume_quality_score),250);
          obs.disconnect();
        }
      },{threshold:0.1});
      if(ref.current) obs.observe(ref.current);
      return ()=>obs.disconnect();
    },[conf]);

    const lvl = (conf.reliability||conf.confidence_level||"Medium").toLowerCase();
    const colors = {high:"#059669", medium:"#d97706", low:"#dc2626"};
    const bgColors = {high:"rgba(5,150,105,0.06)", medium:"rgba(245,158,11,0.07)", low:"rgba(220,38,38,0.07)"};
    const borderColors = {high:"rgba(5,150,105,0.22)", medium:"rgba(245,158,11,0.28)", low:"rgba(220,38,38,0.2)"};
    const barColors = {
      high:"linear-gradient(90deg,#059669,#34d399)",
      medium:"linear-gradient(90deg,#d97706,#fbbf24)",
      low:"linear-gradient(90deg,#dc2626,#f87171)"
    };

    return (
      <div ref={ref} style={{background:bgColors[lvl],border:`1.5px solid ${borderColors[lvl]}`,borderRadius:14,padding:"16px 20px",marginBottom:20,animation:"fadeUp 0.5s ease both"}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:12,marginBottom:12}}>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <span style={{fontSize:22}}>🔬</span>
            <div>

  return (
    <div>

}

/* ── JOBS PAGE ──────────────────────── */
function JobsPage() {
  const [role,setRole]=useState(""); const [jobs,setJobs]=useState([]); const [loading,setLoading]=useState(false); const [err,setErr]=useState("");

  const search = async ()=>{
    if(!role.trim()) return setErr("Enter a role.");
    setLoading(true); setErr(""); setJobs([]);
    try {
      const data = await apiFetch(`/jobs?role=${encodeURIComponent(role)}`);
      if(data.error) throw new Error(data.error);
      setJobs(data.jobs||[]);
    } catch(e){setErr(e.message);}
    finally{setLoading(false);}
  };

  return (
    <div>
      <div className="ph"><h1>💼 Job Search</h1><p>Live listings powered by Adzuna</p></div>
      <div className="card">
        <div style={{display:"flex",gap:12}}>
          <input className="inp" placeholder="e.g. Python Developer, React Engineer…" value={role} onChange={e=>setRole(e.target.value)} onKeyDown={e=>e.key==="Enter"&&search()}/>
          <button className="btn btn-p" onClick={search} disabled={loading} style={{whiteSpace:"nowrap"}}>{loading?"Searching…":"Search →"}</button>
        </div>
        {err&&<div className="alert err" style={{marginTop:12}}>⚠️ {err}</div>}
      </div>
      {jobs.map((j,i)=>(
        <div key={i} className="card" style={{padding:"18px 22px"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:12}}>
            <div>
              <div style={{fontFamily:"'Bricolage Grotesque',sans-serif",fontSize:15,fontWeight:800,color:"var(--light)",marginBottom:4}}>{j.title}</div>
              <div style={{fontSize:13,color:"var(--muted)"}}>{j.company?.display_name||"—"} · {j.location?.display_name||"—"}</div>
            </div>
            {j.redirect_url&&<a href={j.redirect_url} target="_blank" rel="noreferrer" style={{background:"var(--grad)",color:"white",borderRadius:8,padding:"8px 16px",fontSize:13,fontWeight:700,textDecoration:"none",flexShrink:0,fontFamily:"'Bricolage Grotesque',sans-serif"}}>Apply →</a>}
          </div>
          {j.description&&<p style={{marginTop:10,fontSize:13,color:"var(--muted)",lineHeight:1.6}}>{j.description.slice(0,200)}…</p>}
          {j.salary_min&&<div style={{marginTop:8,fontSize:13,fontWeight:700,color:"var(--ok)",fontFamily:"'Bricolage Grotesque',sans-serif"}}>💰 £{Math.round(j.salary_min).toLocaleString()} – £{Math.round(j.salary_max).toLocaleString()}</div>}
        </div>
      ))}
      {!loading&&jobs.length===0&&role&&<div className="card" style={{textAlign:"center",color:"var(--muted)"}}>No jobs found. Try a different search.</div>}
    </div>
  );
}

/* ── PROFILE PAGE ───────────────────── */
function ProfilePage({user,onLogout}) {
  const [dash,setDash]           = useState(null);
  const [changePw,setChangePw]   = useState(false);
  const [oldPw,setOldPw]         = useState("");
  const [newPw,setNewPw]         = useState("");
  const [pwMsg,setPwMsg]         = useState("");
  const [pwErr,setPwErr]         = useState("");
  const [pwLoading,setPwLoading] = useState(false);
  const [resending,setResending] = useState(false);
  const [resendMsg,setResendMsg] = useState("");
  const isVerified = localStorage.getItem("is_verified")==="1";

  useEffect(()=>{if(user)apiFetch("/user/dashboard").then(d=>setDash(d)).catch(()=>{})},[user]);

  const doChangePw = async () => {
    setPwErr(""); setPwMsg("");
    if(!oldPw||!newPw) return setPwErr("Please fill both fields.");
    if(newPw.length<8) return setPwErr("New password must be at least 8 characters.");
    if(!/[A-Z]/.test(newPw)||!/[0-9]/.test(newPw)||!/[^A-Za-z0-9]/.test(newPw))
      return setPwErr("New password must have uppercase, number, and special character.");
    setPwLoading(true);
    try {
      await apiFetch("/auth/change-password",{method:"POST",body:JSON.stringify({old_password:oldPw,new_password:newPw})});
      setPwMsg("✅ Password changed successfully!"); setOldPw(""); setNewPw(""); setChangePw(false);
    } catch(e){ setPwErr(e.message); }
    finally{ setPwLoading(false); }
  };

  const resendVerification = async () => {
    setResending(true);
    try {
      await apiFetch("/auth/resend-verification",{method:"POST"});
      setResendMsg("✅ Verification email sent! Check your inbox.");
    } catch(e){ setResendMsg("Failed to resend. Try again later."); }
    finally{ setResending(false); }
  };

  if(!user) return (
    <div className="card" style={{textAlign:"center",padding:48}}>
      <div style={{fontSize:48,marginBottom:12}}>🔒</div>
      <h3 style={{color:"var(--light)",marginBottom:8,fontFamily:"'Bricolage Grotesque',sans-serif"}}>Not Signed In</h3>
      <p style={{color:"var(--muted)"}}>Sign in to view your full profile and saved data.</p>
    </div>
  );

  return (
    <div>
      <div className="ph"><h1>👤 My Profile</h1><p>Your account and career snapshot</p></div>

      {/* Email verification banner */}
      {!isVerified && (
        <div className="alert warn" style={{marginBottom:20}}>
          📧 <span><strong>Please verify your email.</strong> Check your inbox for the verification link.{" "}
          {resendMsg
            ? <span style={{color:"#059669",fontWeight:600}}>{resendMsg}</span>
            : <button onClick={resendVerification} disabled={resending}
                style={{background:"none",border:"none",cursor:"pointer",color:"var(--p)",fontWeight:700,fontSize:13,textDecoration:"underline"}}>
                {resending?"Sending…":"Resend email"}
              </button>
          }</span>
        </div>
      )}

      {pwMsg&&<div className="alert ok" style={{marginBottom:16}}>✅ {pwMsg}</div>}

      <div className="g2">
        <div className="card">
          <div style={{display:"flex",alignItems:"center",gap:16,marginBottom:20}}>
            <div style={{width:72,height:72,borderRadius:"50%",background:"var(--grad)",display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"'Bricolage Grotesque',sans-serif",fontWeight:800,fontSize:28,color:"white",flexShrink:0}}>
              {user.name.split(" ").map(w=>w[0]).join("").slice(0,2).toUpperCase()}
            </div>
            <div>
              <div style={{fontFamily:"'Bricolage Grotesque',sans-serif",fontSize:20,fontWeight:800,color:"var(--light)"}}>{user.name}</div>
              <div style={{color:"var(--muted)",fontSize:14}}>{user.email}</div>
              {dash&&<div style={{fontSize:12,color:"var(--p)",marginTop:4}}>Member since {dash.user?.member_since}</div>}
            </div>
          </div>
          <div className="info-row"><span className="info-l">User ID</span><span className="info-v">#{user.id}</span></div>
          <div className="info-row"><span className="info-l">Account</span><span className="info-v">Registered ✅</span></div>
          <div className="info-row"><span className="info-l">Email</span><span className="info-v">{isVerified?"Verified ✅":"Not verified ⚠️"}</span></div>
          <div className="info-row"><span className="info-l">Data Saved</span><span className="info-v">Stored in database 🔒</span></div>
          <div style={{marginTop:16,display:"flex",gap:10,flexWrap:"wrap"}}>
            <button className="btn btn-o" onClick={()=>setChangePw(v=>!v)}>🔑 Change Password</button>
            <button className="btn btn-o" onClick={onLogout}>Sign Out</button>
          </div>

          {/* Change password form */}
          {changePw&&(
            <div style={{marginTop:16,padding:16,background:"var(--p5)",borderRadius:12,border:"1px solid var(--border2)"}}>
              <div style={{fontWeight:700,fontSize:14,color:"var(--text)",marginBottom:12}}>🔑 Change Password</div>
              {pwErr&&<div style={{background:"#fef2f2",color:"#b91c1c",borderRadius:8,padding:"8px 12px",fontSize:13,marginBottom:10}}>⚠️ {pwErr}</div>}
              <input className="inp" type="password" placeholder="Current password" value={oldPw} onChange={e=>setOldPw(e.target.value)} style={{marginBottom:8}}/>
              <input className="inp" type="password" placeholder="New password (8+ chars, uppercase, number, special)" value={newPw} onChange={e=>setNewPw(e.target.value)} style={{marginBottom:12}}/>
              <div style={{display:"flex",gap:8}}>
                <button className="btn btn-p" onClick={doChangePw} disabled={pwLoading}>{pwLoading?"Saving…":"Save Password"}</button>
                <button className="btn btn-o" onClick={()=>{setChangePw(false);setPwErr("");}}>Cancel</button>
              </div>
            </div>
          )}
        </div>

        {dash&&(
          <div className="card">
            <div className="card-title">📈 Your Activity</div>
            {[["📄","Resume",dash.has_resume?"Uploaded":"Not uploaded"],["🎯","Skill Analyses",dash.analyses_count+" completed"],["🗺️","Roadmaps",dash.roadmaps_count+" generated"],["💬","Chat Messages",(dash.chat_history||[]).length+" messages"]].map(([ico,label,val])=>(
              <div key={label} className="info-row"><span className="info-l">{ico} {label}</span><span className="info-v">{val}</span></div>
            ))}
          </div>
        )}
      </div>
    </div>
  );
}

/* ══════════════════════════════════════════════════════════════════
   ADMIN DASHBOARD PAGE
══════════════════════════════════════════════════════════════════ */
function AdminPage({user}) {
  const [tab,setTab]       = useState("overview");
  const [stats,setStats]   = useState(null);
  const [users,setUsers]   = useState([]);
  const [loading,setLoading] = useState(false);
  const [msg,setMsg]       = useState("");
  const [err,setErr]       = useState("");
  const [search,setSearch] = useState("");
  const [editUser,setEditUser] = useState(null); // {id,name,email}
  const [editName,setEditName] = useState("");
  const [editEmail,setEditEmail] = useState("");

  const flash = (m,isErr=false) => { isErr?setErr(m):setMsg(m); setTimeout(()=>{setMsg("");setErr("");},3000); };

  // Load stats on mount
  useEffect(()=>{ loadStats(); },[]);

  const loadStats = async () => {
    try { const d = await apiFetch("/admin/stats"); setStats(d); } catch(e){ flash(e.message,true); }
  };

  const loadUsers = async () => {
    setLoading(true);
    try { const d = await apiFetch("/admin/users?limit=100"); setUsers(d); } catch(e){ flash(e.message,true); }
    finally { setLoading(false); }
  };

  useEffect(()=>{ if(tab==="users") loadUsers(); },[tab]);

  const deleteUser = async (id,name) => {
    if(!confirm(`Delete user "${name}"? This cannot be undone.`)) return;
    try {
      await apiFetch(`/admin/users/${id}`,{method:"DELETE"});
      flash(`✅ User "${name}" deleted.`);
      setUsers(u=>u.filter(x=>x.id!==id));
      loadStats();
    } catch(e){ flash(e.message,true); }
  };

  const promoteUser = async (id,name) => {
    try {
      await apiFetch(`/admin/users/${id}/promote`,{method:"POST"});
      flash(`✅ "${name}" promoted to admin.`);
      setUsers(u=>u.map(x=>x.id===id?{...x,is_admin:true}:x));
    } catch(e){ flash(e.message,true); }
  };

  const demoteUser = async (id,name) => {
    if(!confirm(`Remove admin rights from "${name}"?`)) return;
    try {
      await apiFetch(`/admin/users/${id}/demote`,{method:"POST"});
      flash(`✅ "${name}" demoted to regular user.`);
      setUsers(u=>u.map(x=>x.id===id?{...x,is_admin:false}:x));
    } catch(e){ flash(e.message,true); }
  };

  const saveEdit = async () => {
    try {
      await apiFetch(`/admin/users/${editUser.id}`,{method:"PATCH",
        body:JSON.stringify({name:editName,email:editEmail})});
      flash("✅ User updated.");
      setUsers(u=>u.map(x=>x.id===editUser.id?{...x,name:editName,email:editEmail}:x));
      setEditUser(null);
    } catch(e){ flash(e.message,true); }
  };

  const filtered = users.filter(u=>
    u.name.toLowerCase().includes(search.toLowerCase()) ||
    u.email.toLowerCase().includes(search.toLowerCase())
  );

  const StatCard = ({icon,label,value,color="#1d6ae5",sub}) => (
    <div style={{background:"white",border:"1.5px solid var(--border)",borderRadius:16,
                 padding:"20px 24px",display:"flex",flexDirection:"column",gap:4,
                 boxShadow:"0 2px 8px rgba(0,0,0,0.04)"}}>
      <div style={{fontSize:28}}>{icon}</div>
      <div style={{fontSize:28,fontWeight:800,color,fontFamily:"'Bricolage Grotesque',sans-serif"}}>{value}</div>
      <div style={{fontSize:13,fontWeight:600,color:"var(--text)"}}>{label}</div>
      {sub&&<div style={{fontSize:11,color:"var(--muted)"}}>{sub}</div>}
    </div>
  );

  return (
    <div style={{padding:"32px 28px",maxWidth:1100,margin:"0 auto"}}>
      {/* Header */}
      <div style={{display:"flex",alignItems:"center",gap:14,marginBottom:28}}>
        <div style={{width:52,height:52,borderRadius:14,background:"linear-gradient(135deg,#f59e0b,#d97706)",
                     display:"flex",alignItems:"center",justifyContent:"center",fontSize:26}}>🛡️</div>
        <div>
          <div style={{fontSize:24,fontWeight:800,fontFamily:"'Bricolage Grotesque',sans-serif"}}>Admin Dashboard</div>
          <div style={{fontSize:13,color:"var(--muted)"}}>Signed in as <b>{user&&user.name}</b> · Full access</div>
        </div>
        <button onClick={loadStats} style={{marginLeft:"auto",background:"var(--p4)",border:"none",
          borderRadius:8,padding:"8px 16px",cursor:"pointer",fontSize:13,color:"var(--p3)",fontWeight:600}}>
          🔄 Refresh
        </button>
      </div>

      {/* Flash messages */}
      {msg&&<div style={{background:"#f0fdf4",border:"1.5px solid #86efac",color:"#166534",
        borderRadius:10,padding:"10px 16px",marginBottom:16,fontSize:13}}>{msg}</div>}
      {err&&<div style={{background:"#fef2f2",border:"1.5px solid #fca5a5",color:"#dc2626",
        borderRadius:10,padding:"10px 16px",marginBottom:16,fontSize:13}}>{err}</div>}

      {/* Tabs */}
      <div style={{display:"flex",gap:4,marginBottom:24,background:"var(--bg3)",
                   borderRadius:12,padding:4,width:"fit-content"}}>
        {[["overview","📊 Overview"],["users","👥 Users"],["recent","🕒 Recent"]].map(([id,label])=>(
          <button key={id} onClick={()=>setTab(id)}
            style={{padding:"8px 20px",border:"none",borderRadius:9,cursor:"pointer",
                    fontSize:13,fontWeight:600,transition:"all 0.15s",
                    background:tab===id?"white":"transparent",
                    color:tab===id?"var(--p3)":"var(--muted)",
                    boxShadow:tab===id?"0 1px 4px rgba(0,0,0,0.08)":"none"}}>
            {label}
          </button>
        ))}
      </div>

      {/* ── OVERVIEW TAB ── */}
      {tab==="overview"&&stats&&(
        <>
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(180px,1fr))",gap:16,marginBottom:28}}>
            <StatCard icon="👥" label="Total Users"     value={stats.total_users}       color="#1d6ae5"/>
            <StatCard icon="✅" label="Verified"        value={stats.verified_users}     color="#059669"
                      sub={`${stats.unverified} unverified`}/>
            <StatCard icon="🛡️" label="Admins"         value={stats.admin_users}        color="#d97706"/>

            {[
              {label:"Email Verified",  val:stats.total_users?Math.round(stats.verified_users/stats.total_users*100):0, color:"#059669"},
              {label:"Resumes Uploaded",val:stats.total_users?Math.round(stats.resumes_uploaded/stats.total_users*100):0, color:"#7c3aed"},
